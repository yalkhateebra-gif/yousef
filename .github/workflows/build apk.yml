name: Build Flet APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.13'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl git unzip xz-utils zip \
            libglu1-mesa clang cmake ninja-build \
            pkg-config libgtk-3-dev

      - name: Install Flutter 3.41.0 manually
        run: |
          curl -Lo flutter.tar.xz https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.29.0-stable.tar.xz
          tar xf flutter.tar.xz -C $HOME
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          echo "$HOME/flutter/bin/cache/dart-sdk/bin" >> $GITHUB_PATH

      - name: Flutter config
        run: |
          flutter config --no-analytics
          flutter precache --android
          flutter doctor -v

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet==0.85.1

      - name: Verify Flet installation
        run: flet --version

      - name: Build APK
        run: |
          flet build apk \
            --no-rich-output \
            --verbose

      - name: List build output
        run: find . -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flet-apk
          path: |
            build/apk/*.apk
            dist/*.apk
          if-no-files-found: warn
          retention-days: 30
